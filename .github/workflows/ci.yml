name: CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer ruff
        run: pip install ruff

      - name: Lancer ruff
        run: ruff check .

  unit_tests:
    name: Tests unitaires et mockes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer les tests unitaires et mockes
        run: pytest -v -m unit --junitxml=unit-report.xml --html=rapport.html --self-contained-html

      - name: Publier le rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: unit-report.xml

      - name: Publier le rapport HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests-unitaires
          path: rapport.html

  e2e_tests:
    name: Tests E2E (Selenium)
    needs: unit_tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Lancer les tests E2E
        env:
          HEADLESS: "1"
          BASE_URL: "http://localhost:8000"
        run: pytest -v -m e2e --junitxml=e2e-report.xml --html=rapport.html --self-contained-html

      - name: Publier le rapport de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: e2e-report.xml

      - name: Publier le rapport HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests-e2e
          path: rapport.html
