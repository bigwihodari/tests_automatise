name: CI

on:
  push:
  pull_request:

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer ruff
        run: pip install ruff

      - name: Lancer ruff
        run: ruff check .

  tests_complets:
    name: Suite complete (unitaires + E2E cross-browser, parallele)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Installer Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installer Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Lancer la suite complete (unitaires + E2E, parallele, couverture)
        env:
          # Mode headless obligatoire : le runner CI n'a pas d'affichage graphique.
          HEADLESS: "1"
        run: pytest --cov --cov-report=html --cov-report=term-missing -n auto --junitxml=rapport-junit.xml --html=rapport.html --self-contained-html

      - name: Publier le rapport de tests (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-tests
          path: rapport.html

      - name: Publier le rapport JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-junit
          path: rapport-junit.xml

      - name: Publier le rapport de couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture
          path: htmlcov/
